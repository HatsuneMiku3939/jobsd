name: CI

on:
  push:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Print Go version
        run: go version

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Windows lifecycle verification
        if: runner.os == 'Windows'
        run: go test ./cmd/jobsd -run TestWindowsSchedulerLifecycle -count=1
