name: CI

on:
  push:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Print Go version
        run: go version

      - name: Lint
        run: go vet ./...

      - name: Test
        if: runner.os != 'Windows'
        run: go test ./...

      - name: Test (windows packages excluding cmd/jobsd)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packages = go list ./... | Where-Object { $_ -ne 'github.com/hatsunemiku3939/jobsd/cmd/jobsd' }
          go test $packages

      - name: Windows command package verification
        if: runner.os == 'Windows'
        run: go test ./cmd/jobsd -run TestCurrentBuildInfo -count=1
